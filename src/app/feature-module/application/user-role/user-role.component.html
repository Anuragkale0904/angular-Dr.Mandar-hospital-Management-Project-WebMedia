<div class="card mb-0">
  <div class="card-body">
    <!-- Page Header -->
    <div class="page-header">
      <div class="content-page-header" style="margin: 0 0 15px 0;">
        <h6>Hospital/Branch Wise Report</h6>
        <div class="col-lg-6 col-md-3 col-sm-12">
          <div class="add-customer-btns text-end">
            <a href="javascript:void(0)" class="btn customer-btn-save" (click)="exportAsPDF()">
              Export as PDF
            </a>
            <a href="javascript:void(0)" class="btn customer-btn-save" (click)="exportAsExcel()">
              Export as Excel
            </a>
          </div>
        </div>
      </div>
    </div>
    <!-- /Page Header -->
    <div class="row">
      <div class="col-md-12">
        <form action="#">
          <div class="form-group-item">
            <div class="row">
              <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="input-block mb-3">
                  <label>
                    Select Hospital/Branch <span class="text-danger">*</span>
                  </label>
                  <div class="position-relative custom-select-wrapper">

                    <!-- Main Input -->
                    <input type="text" class="form-control form-control-sm custom-select-input"
                      [value]="selectedBranchName" placeholder="Select Hospital/Branch" readonly
                      (click)="toggleBranchDropdown()" />

                    <!-- Dropdown Panel -->
                    <div class="custom-select-dropdown" *ngIf="showBranchDropdown">

                      <!-- Search Box -->
                      <div class="custom-search-box">
                        <input type="text" class="form-control form-control-sm" placeholder="Search Branch"
                          [(ngModel)]="branchSearchText" (input)="filterBranches()" />
                      </div>

                      <!-- Options List -->
                      <div class="custom-options-list">
                        <div class="custom-option-item" *ngFor="let branch of filteredBranches"
                          (click)="selectBranch(branch.id, branch.branch_name)">
                          {{ branch.branch_name }}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>


              <div class="col-lg-2 col-md-2 col-sm-12">
                <div class="input-block mb-3">
                  <label>From Date<span class="text-danger">*</span></label>
                  <input type="date" class="form-control form-control-sm" [(ngModel)]="fromDate" name="fromDate">
                </div>
              </div>
              <div class="col-lg-2 col-md-2 col-sm-12">
                <div class="input-block mb-3">
                  <label>To Date<span class="text-danger">*</span></label>
                  <input type="date" class="form-control form-control-sm" [(ngModel)]="toDate" name="toDate">

                </div>
              </div>
              <div class="col-lg-4 col-md-4 col-sm-12">
                <div class="input-block mb-3">
                  <!-- invisible label keeps height same as other inputs -->
                  <label class="d-block invisible">Actions</label>

                  <div class="d-flex gap-2 flex-wrap">
                    <a href="javascript:void(0)" (click)="searchReport()"
                      class="btn btn-primary btn-sm d-flex align-items-center justify-content-center"
                      style="height: 31px; width: 90px;">
                      <i class="fa fa-search me-1"></i> Search
                    </a>

                  </div>
                </div>
              </div>

            </div>
          </div>
        </form>

        <div class="row ">
          <div class="col-sm-12">
            <div class="card-body pt-1 pb-2">
              <div class="table-responsive">
                <div class="d-flex justify-content-end mb-1 p-0">
                  <input type="text" class="form-control form-control-sm w-auto" style="min-width:180px;height:30px;"
                    placeholder="Search" [(ngModel)]="searchText" (input)="applySearch()">
                </div>

                <table class="datatable table table-stripped">
                  <thead>
                    <tr>
                      <th>Sr.No</th>
                      <th>Branch/Hospital</th>
                      <th>Address</th>
                      <th>Contact Person</th>
                      <th>Mobile</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let item of paginatedReportList; let i = index">
                      <td>
                        {{ pageIndex * pageSize + i + 1 }}
                      </td>
                      <td>{{ item.branch_name }}</td>
                      <td>{{ item.address }}</td>
                      <td>{{ item.contact_person_name }}</td>
                      <td>{{ item.mobile_no }}</td>
                    </tr>
                    <tr *ngIf="filteredReportList.length === 0">
                      <td colspan="6" class="text-center">No Data Found</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <mat-paginator [length]="filteredReportList.length" [pageSizeOptions]="[5, 10, 25]" [pageSize]="pageSize"
                [pageIndex]="pageIndex" (page)="onPageChange($event)" showFirstLastButtons>
              </mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
