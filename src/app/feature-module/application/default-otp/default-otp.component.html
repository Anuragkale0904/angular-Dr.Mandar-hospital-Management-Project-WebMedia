                  <!-- Add Tax & Discount Modal -->
                  <div class="modal custom-modal fade" id="add_discount" role="dialog">
                    <div class="modal-dialog modal-dialog-centered modal-md">
                      <div class="modal-content">
                        <div class="modal-header border-0 pb-0">
                          <div
                            class="form-header modal-header-title text-start mb-0 align-center"
                            >
                            <h4 class="mb-0">Year</h4>
                          </div>
                          <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                          ></button>
                        </div>
                        <div class="modal-body">
                          <div class="row">
                            <div class="col-lg-12 col-md-12">
                              <div class="input-block mb-3">
                                <label for="Year">Year</label>
                                <input type="text" class="form-control" placeholder="2023-24" />
                              </div>
                            </div>
                           
                            
                          </div>
                        </div>
                        <div class="modal-footer add-tax-btns">
                          <button
                            type="reset"
                            data-bs-dismiss="modal"
                            class="btn btn-back cancel-btn me-2"
                            >
                            Cancel
                          </button>
                          <button
                            type="submit"
                            data-bs-dismiss="modal"
                            class="btn btn-primary paid-continue-btn"
                            >
                            Save
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Delete Items Modal -->
                  <div class="modal custom-modal fade" id="delete_discount" role="dialog">

                      <!-- Add Bank Details Modal -->
                      <div class="modal custom-modal fade" id="bank_details" role="dialog">
                        <div class="modal-dialog modal-dialog-centered modal-md">
                          <div class="modal-content">
                            <div class="modal-header border-0 pb-0">
                              <div class="form-header modal-header-title text-start mb-0">
                                <h4 class="mb-0">Add Bank Details</h4>
                              </div>
                              <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                                aria-label="Close"
                              ></button>
                            </div>
                            <div class="modal-body">
                              <div class="row">
                                <div class="col-lg-12 col-md-12">
                                  <div class="input-block mb-3">
                                    <label for="bank">Bank Name <span class="text-danger">*</span></label>
                                    <input
                                      type="text"
                                      class="form-control"
                                      placeholder="Enter Bank Name"
                                      />
                                    </div>
                                  </div>
                                  <div class="col-lg-12 col-md-12">
                                    <div class="input-block mb-3">
                                      <label for="Number">Account Number <span class="text-danger">*</span></label>
                                      <input
                                        type="number"
                                        class="form-control"
                                        placeholder="Enter Account Number"
                                        />
                                      </div>
                                    </div>
                                    <div class="col-lg-12 col-md-12">
                                      <div class="input-block mb-3">
                                        <label for="Holder"
                                          >Account Holder Name <span class="text-danger">*</span></label
                                          >
                                          <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Enter Account Holder Name"
                                            />
                                          </div>
                                        </div>
                                        <div class="col-lg-12 col-md-12">
                                          <div class="input-block mb-3">
                                            <label for="Branch">Branch Name <span class="text-danger">*</span></label>
                                            <input
                                              type="text"
                                              class="form-control"
                                              placeholder="Enter Branch Name"
                                              />
                                            </div>
                                          </div>
                                          <div class="col-lg-12 col-md-12">
                                            <div class="input-block mb-0">
                                              <label for="Ifsc">IFSC Code <span class="text-danger">*</span></label>
                                              <input
                                                type="number"
                                                class="form-control"
                                                placeholder="Enter IFSC COde"
                                                />
                                              </div>
                                            </div>
                                          </div>
                                        </div>
                                        <div class="modal-footer">
                                          <a href="javascript:void(0);" data-bs-dismiss="modal" class="btn btn-back cancel-btn me-2"
                                            >Cancel</a
                                            >
                                            <a
                                              href="javascript:void(0);"
                                              data-bs-dismiss="modal"
                                              class="btn btn-primary paid-continue-btn"
                                              >Save</a
                                              >
                                            </div>
