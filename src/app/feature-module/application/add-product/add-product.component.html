<!-- Page Wrapper -->
<div class="card mb-0">
  <div class="card-body">
    <div class="page-header">
      <div class="content-page-header">
        <h5>Add Product</h5>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <div class="form-group-item border-0 mb-0">
          <div class="row align-item-center">

            <!-- product name -->
            <div class="col-lg-3 col-md-6 col-sm-12">
              <div class="input-block mb-3">
                <label for="productname">Product Name*</label>
                <input type="text" class="form-control" placeholder="Enter Product Name" />
              </div>
            </div>

            <!-- Quantity -->
            <div class="col-lg-2 col-md-6 col-sm-12">
              <div class="input-block mb-3">
                <label for="Quantity">Quantity*</label>
                <input type="number" class="form-control" placeholder="Enter Quantity" />
              </div>
            </div>

            <div class="col-lg-1 col-md-1 col-sm-12">
              <form class="add-customer-btns text-end pt-4">
                <button type="submit" class="btn btn-primary" style="margin-top: 5px;">ADD</button>
              </form>
            </div>
          </div>
        </div>

        
        <div class="form-group-item">
          <div class="card-table">
            <div class="card-body">
              <div class="table-responsive no-pagination">
                <table matSort (matSortChange)="sortData($event)" class="table table-center table-hover datatable">
                  <thead class="thead-light">
                    <tr>
                      <th mat-sort-header="product">Sr. No.</th>
                      <th mat-sort-header="quantity">Product Name</th>
                      <th mat-sort-header="unit">Quantity</th>
                      <th mat-sort-header="action">Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    <!-- @for (data of editcreditnotes; track data; let i = $index) { -->
                    <tr>
                      <td>1.</td>
                      <td>xyz</td>

                      <td>10</td>

                      <td class="d-flex align-items-center">
                        <a href="javascript:void(0);" class="btn-action-icon me-2" data-bs-toggle="modal"
                          data-bs-target="#add_discount"><span><i class="feather icon-edit"></i></span></a>
                        <a href="javascript:void(0);" class="btn-action-icon" data-bs-toggle="modal"
                          data-bs-target="#delete_discount"><span><i class="feather icon-trash-2"></i></span></a>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- /Page Wrapper -->

<!-- Add Tax & Discount Modal -->
<div class="modal custom-modal fade" id="add_discount" role="dialog">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <div class="form-header modal-header-title text-start mb-0 align-center">
          <h4 class="mb-0">Add Product</h4>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <!-- product name -->
          <div class="col-lg-12 col-md-12 col-sm-12">
            <div class="input-block mb-3">
              <label for="productname">Product Name*</label>
              <input type="text" class="form-control" placeholder="Enter Product Name" />
            </div>
          </div>

          <!-- Quantity -->
          <div class="col-lg-12 col-md-12 col-sm-12">
            <div class="input-block mb-3">
              <label for="Quantity">Quantity*</label>
              <input type="number" class="form-control" placeholder="Enter Quantity" />
            </div>
          </div>
          <div class="modal-footer add-tax-btns">
            <button type="reset" data-bs-dismiss="modal" class="btn btn-back cancel-btn me-2">
              Cancel
            </button>
            <button type="submit" data-bs-dismiss="modal" class="btn btn-primary paid-continue-btn">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- /Add Tax & Discount Modal -->

    <!-- Delete Items Modal -->
    <div class="modal custom-modal fade" id="delete_discount" role="dialog">
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
          <div class="modal-header border-0 justify-content-center pb-0">
            <div class="form-header modal-header-title text-center mb-0">
              <h4 class="mb-2">Delete Product </h4>
              <p>Are you sure want to delete?</p>
            </div>
          </div>
          <div class="modal-body">
            <div class="modal-btn delete-action">
              <div class="row">
                <div class="col-6">
                  <a href="javascript:void(0);" data-bs-dismiss="modal"
                    class="btn btn-primary paid-continue-btn">Delete</a>
                </div>
                <div class="col-6">
                  <a href="javascript:void(0);" data-bs-dismiss="modal"
                    class="btn btn-primary paid-cancel-btn">Cancel</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /Delete Items Modal -->

    <!-- Add Bank Details Modal -->
    <div class="modal custom-modal fade" id="bank_details" role="dialog">
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <div class="form-header modal-header-title text-start mb-0">
              <h4 class="mb-0">Add Bank Details</h4>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-lg-12 col-md-12">
                <div class="input-block mb-3">
                  <label for="bank">Bank Name <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" placeholder="Enter Bank Name" />
                </div>
              </div>
              <div class="col-lg-12 col-md-12">
                <div class="input-block mb-3">
                  <label for="Number">Account Number <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" placeholder="Enter Account Number" />
                </div>
              </div>
              <div class="col-lg-12 col-md-12">
                <div class="input-block mb-3">
                  <label for="Holder">Account Holder Name <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" placeholder="Enter Account Holder Name" />
                </div>
              </div>
              <div class="col-lg-12 col-md-12">
                <div class="input-block mb-3">
                  <label for="Branch">Branch Name <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" placeholder="Enter Branch Name" />
                </div>
              </div>
              <div class="col-lg-12 col-md-12">
                <div class="input-block mb-0">
                  <label for="Ifsc">IFSC Code <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" placeholder="Enter IFSC COde" />
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <a href="javascript:void(0);" data-bs-dismiss="modal" class="btn btn-back cancel-btn me-2">Cancel</a>
            <a href="javascript:void(0);" data-bs-dismiss="modal" class="btn btn-primary paid-continue-btn">Save</a>
          </div>
        </div>
      </div>
    </div>
    <!-- /Add Bank Details Modal -->
