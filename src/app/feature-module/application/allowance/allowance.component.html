<div class="card mb-0">
  <div class="card-body">
    <!-- Page Header -->
    <div class="page-header">
      <div class="content-page-header">
        <h5>Allowance</h5>
        <hr>
      </div>
    </div>
    <!-- /Page Header -->
    <div class="row">
      <div class="col-md-12">
        <!-- Basic Details -->
        <form action="#" [formGroup]="phoneForm">

          <!-- Allowance -->
          <div class="form-group-item">
            <div class="row">
              <div class="col-md-6">
                <div class="billing-btn mb-2">
                  <h5 class="form-title">Travel Allowance</h5>
                </div>
                <div class="input-block mb-3">
                  <label for="title">Title</label>
                  <input type="text" class="form-control">
                </div>
                <div class="input-block mb-3">
                  <label for="min">Min*</label>
                  <input type="text" class="form-control">
                </div>
                <div class="input-block mb-3">
                  <label for="max">Max</label>
                  <input type="text" class="form-control">
                </div>
                <!-- Submit button -->
                <div class="col-lg-12 text-center mb-2">
                  <form class="add-customer-btns">
                    <button type="submit" class="btn btn-primary">ADD</button>
                  </form>
                </div>
                <!-- table -->
                <div class="row">
                  <div class="col-sm-12">
                    <div class="card-table">
                      <div class="card-body">
                        <div class="table-responsive">
                          <div class="table-scroll">
                            <div class="inventory-table">
                              <table matSort (matSortChange)="sortData($event)"
                                class="table table-center table-hover datatable">
                                <thead class="thead-light">
                                  <tr>
                                    <th mat-sort-header="Sr. No.">Sr. No.</th>
                                    <th mat-sort-header="title">Title</th>
                                    <th mat-sort-header="Min">Min</th>
                                    <th mat-sort-header="Max">Max</th>
                                    <!-- <th mat-sort-header="action">Action</th> -->
                                  </tr>
                                </thead>
                                <tbody>

                                  <tr>
                                    <!-- <td>1.</td>
                                    <td>Doctor 1</td>
                                    <td>Pune</td>

                                    <td>Kishore Medical</td>
                                    <td class="d-flex align-items-center">
                                      <a href="javascript:void(0);" class="btn-action-icon me-2" data-bs-toggle="modal"
                                        data-bs-target="#add_discount"><span><i
                                            class="feather icon-edit"></i></span></a>
                                      <a href="javascript:void(0);" class="btn-action-icon" data-bs-toggle="modal"
                                        data-bs-target="#delete_discount"><span><i
                                            class="feather icon-trash-2"></i></span></a>
                                    </td> -->
                                  </tr>

                                </tbody>
                              </table>
                            </div>
                          </div>
                        </div>
                        <app-custom-pagination></app-custom-pagination>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-md-6">
                <div class="billing-btn mb-2">
                  <h5 class="form-title">Other Allowance</h5>
                </div>
                <div class="input-block mb-3">
                  <label for="AllowanceName">Allowance Name</label>
                  <input type="text" class="form-control" placeholder="Enter Allowance Name">
                </div>

                <!-- Submit Button -->
                <div class="col-lg-12 text-center mb-2">
                  <form class="add-customer-btns">
                    <button type="submit" class="btn btn-primary" >ADD</button>
                  </form>
                </div>
                <!-- table -->
                <div class="row">
                  <div class="col-sm-12">
                    <div class="card-table">
                      <div class="card-body">
                        <div class="table-responsive">
                          <div class="table-scroll">
                            <div class="inventory-table">
                              <table matSort (matSortChange)="sortData($event)"
                                class="table table-center table-hover datatable">
                                <thead class="thead-light">
                                  <tr>
                                    <th mat-sort-header="Sr. No.">Sr. No.</th>
                                    <th mat-sort-header="role">Role</th>
                                    <th mat-sort-header="DA">DA(min/max)</th>
                                    <th mat-sort-header="EA">EA(min/max)</th>
                                    <th mat-sort-header="OUT">OUT(min/max)</th>
                                    <!-- <th mat-sort-header="action">Action</th> -->
                                  </tr>
                                </thead>
                                <tbody>

                                  <tr>
                                    <td>1.</td>
                                    <td>AGM</td>
                                    <td>0/0</td>
                                    <td>0/0</td>
                                    <td>0/0</td>

                                    <!-- <td class="d-flex align-items-center">
                              <a href="javascript:void(0);" class="btn-action-icon me-2" data-bs-toggle="modal"
                                data-bs-target="#add_discount"><span><i class="feather icon-edit"></i></span></a>
                              <a href="javascript:void(0);" class="btn-action-icon" data-bs-toggle="modal"
                                data-bs-target="#delete_discount"><span><i class="feather icon-trash-2"></i></span></a>
                            </td> -->
                                  </tr>

                                </tbody>
                              </table>
                            </div>
                          </div>
                        </div>
                        <!-- <app-custom-pagination></app-custom-pagination> -->
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>

          <!-- <div class="add-customer-btns text-end">
            <a [routerLink]="routes.employeelist" class="btn customer-btn-cancel">Cancel</a>
            <a [routerLink]="routes.employeelist" class="btn customer-btn-save">Add Employee</a>
          </div> -->
        </form>
      </div>
    </div>
  </div>
</div>
